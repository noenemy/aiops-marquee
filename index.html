<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#232F3E">
    <meta name="description" content="AWS Summit AIOps Typography Rotation Display">
    <title>AIOps Typography Rotation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main id="app" class="app">
        <header class="brand-header" aria-label="AWS Summit Seoul 2026">
            <img
                class="brand-header__logo"
                src="aws-logo.png"
                alt="Amazon Web Services"
            />
            <span class="brand-header__title">AWS SUMMIT SEOUL 2026</span>
        </header>
        <section
            id="typography-card"
            class="typography-card"
            role="region"
            aria-live="polite"
            aria-label="AIOps 홍보 문구"
        >
            <div class="typography-card__inner">
                <h1 id="card-main" class="typography-card__main"></h1>
                <p id="card-sub" class="typography-card__sub"></p>
            </div>
        </section>
    </main>
    <script src="app.js"></script>
</body>
</html>
